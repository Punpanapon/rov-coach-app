<!DOCTYPE html>
<html>
<head>
  <!--

    This is a placeholder for base href that will be replaced by the value of

  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="RoV esports team management & draft simulation coach.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- iOS PWA meta tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RoV Coach">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/Icon-152.png">
  <link rel="apple-touch-icon" sizes="167x167" href="icons/Icon-167.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/Icon-180.png">

  <!-- Android / general PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#6C5CE7">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>RoV Coach</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Twitch Player JS SDK + control bridge for PIP sync -->
  <script src="https://player.twitch.tv/js/embed/v1.js"></script>
  <script>
  (function() {
    var players = window._twitchPlayers = {};

    window._createTwitchPlayer = function(id, videoId, muted, time, autoplay) {
      function tryInit() {
        if (typeof Twitch === 'undefined' || !Twitch.Player) {
          setTimeout(tryInit, 200);
          return;
        }
        var el = document.getElementById(id);
        if (!el) { requestAnimationFrame(tryInit); return; }
        el.innerHTML = '';
        var opts = {
          video: videoId,
          width: '100%',
          height: '100%',
          autoplay: !!autoplay,
          muted: !!muted
        };
        if (time) opts.time = time;
        try { players[id] = new Twitch.Player(id, opts); }
        catch (e) { console.warn('[TwitchBridge]', e); }
      }
      setTimeout(tryInit, 50);
    };

    window._destroyTwitchPlayer = function(id) {
      // Clean up speed simulation if active for this player
      if (window._twitchSpeedSim && window._twitchSpeedSim.id === id) {
        clearInterval(window._twitchSpeedSim.timer);
        window._twitchSpeedSim = null;
      }
      var p = players[id];
      if (p) { try { p.destroy(); } catch(e) {} }
      delete players[id];
    };

    window._getTwitchPlayerTime = function(id) {
      var p = players[id];
      return (p && p.getCurrentTime) ? p.getCurrentTime() : 0;
    };

    window._isTwitchPlayerPaused = function(id) {
      try {
        var p = players[id];
        return (p && typeof p.isPaused === 'function') ? p.isPaused() : true;
      } catch(e) { console.warn('[TwitchBridge] isPaused error:', e); return true; }
    };

    window._twitchPlayerPlay = function(id) {
      try { var p = players[id]; if (p && typeof p.play === 'function') p.play(); }
      catch(e) { console.warn('[TwitchBridge] play error:', e); }
    };

    window._twitchPlayerPause = function(id) {
      try { var p = players[id]; if (p && typeof p.pause === 'function') p.pause(); }
      catch(e) { console.warn('[TwitchBridge] pause error:', e); }
    };

    window._twitchPlayerSeek = function(id, seconds) {
      try { var p = players[id]; if (p && typeof p.seek === 'function') p.seek(seconds); }
      catch(e) { console.warn('[TwitchBridge] seek error:', e); }
    };

    window._twitchPlayerSetPlaybackRate = function(id, rate) {
      try {
        // Clear any existing speed simulation
        if (window._twitchSpeedSim && window._twitchSpeedSim.timer) {
          clearInterval(window._twitchSpeedSim.timer);
          window._twitchSpeedSim = null;
        }

        var p = players[id];
        if (!p) return;

        // Normal speed – nothing to simulate
        if (rate === 1.0) return;

        // Twitch iframe is cross-origin so we can't touch the <video> element.
        // Simulate speed changes by periodically seeking.
        var intervalMs = 250;
        var timer = setInterval(function() {
          try {
            if (!p || (typeof p.isPaused === 'function' && p.isPaused())) return;
            var t = (typeof p.getCurrentTime === 'function') ? p.getCurrentTime() : 0;
            // extra = (rate - 1) * interval_seconds
            // For 2x: advance extra 0.25s every 0.25s (double speed)
            // For 0.5x: rewind 0.125s every 0.25s (half speed)
            var extra = (rate - 1.0) * (intervalMs / 1000);
            var target = t + extra;
            if (target < 0) target = 0;
            if (typeof p.seek === 'function') p.seek(target);
          } catch(e) {}
        }, intervalMs);
        window._twitchSpeedSim = { id: id, rate: rate, timer: timer };
      } catch(e) { console.warn('[TwitchBridge] setPlaybackRate error:', e); }
    };

    window._twitchPlayerGetPlaybackRate = function(id) {
      try {
        // Return the simulated rate if active
        if (window._twitchSpeedSim && window._twitchSpeedSim.id === id) {
          return window._twitchSpeedSim.rate;
        }
        return 1;
      } catch(e) { return 1; }
    };
  })();
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
