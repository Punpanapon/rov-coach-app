<html>
<head>

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="RoV esports team management & draft simulation coach.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- iOS PWA meta tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">

  <meta name="apple-mobile-web-app-title" content="RoV Coach">

  <link rel="apple-touch-icon" sizes="167x167" href="icons/Icon-167.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/Icon-180.png">

  <!-- Android / general PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#6C5CE7">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>RoV Coach</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Twitch Player JS SDK + control bridge for PIP sync -->
  <script src="https://player.twitch.tv/js/embed/v1.js"></script>
  <script>
  (function() {
    var players = window._twitchPlayers = {};

    window._createTwitchPlayer = function(id, videoId, muted, time, autoplay) {
      function tryInit() {
        if (typeof Twitch === 'undefined' || !Twitch.Player) {
          setTimeout(tryInit, 200);
          return;
        }
        var el = document.getElementById(id);
        if (!el) { requestAnimationFrame(tryInit); return; }
        el.innerHTML = '';
        var opts = {
          video: videoId,
          width: '100%',
          height: '100%',
          autoplay: !!autoplay,
          muted: !!muted
        };
        if (time) opts.time = time;
        try { players[id] = new Twitch.Player(id, opts); }
        catch (e) { console.warn('[TwitchBridge]', e); }
      }
      setTimeout(tryInit, 50);
    };

    window._destroyTwitchPlayer = function(id) {
      var p = players[id];
      if (p) { try { p.destroy(); } catch(e) {} }
      delete players[id];
    };

    window._getTwitchPlayerTime = function(id) {
      var p = players[id];
      return (p && p.getCurrentTime) ? p.getCurrentTime() : 0;
    };

    window._isTwitchPlayerPaused = function(id) {
      try {
        var p = players[id];
        return (p && typeof p.isPaused === 'function') ? p.isPaused() : true;
      } catch(e) { console.warn('[TwitchBridge] isPaused error:', e); return true; }
    };

    window._twitchPlayerPlay = function(id) {
      try { var p = players[id]; if (p && typeof p.play === 'function') p.play(); }
      catch(e) { console.warn('[TwitchBridge] play error:', e); }
    };

    window._twitchPlayerPause = function(id) {
      try { var p = players[id]; if (p && typeof p.pause === 'function') p.pause(); }
      catch(e) { console.warn('[TwitchBridge] pause error:', e); }
    };

    window._twitchPlayerSeek = function(id, seconds) {
      try { var p = players[id]; if (p && typeof p.seek === 'function') p.seek(seconds); }
      catch(e) { console.warn('[TwitchBridge] seek error:', e); }
    };

    window._twitchPlayerSetPlaybackRate = function(id, rate) {
      try {
        var p = players[id];
        if (!p) return;
        // 1. Try Twitch Player API directly
        if (typeof p.setPlaybackRate === 'function') {
          p.setPlaybackRate(rate);
          return;
        }
        // 2. Try internal player reference
        if (p._player && typeof p._player.setPlaybackRate === 'function') {
          p._player.setPlaybackRate(rate);
          return;
        }
        // 3. Try the underlying <video> element via the container div
        var el = document.getElementById(id);
        if (!el) return;
        var video = el.querySelector('video');
        if (video) { video.playbackRate = rate; return; }
        // 4. Try reaching into the iframe
        var iframe = el.querySelector('iframe');
        if (iframe) {
          try {
            var v = iframe.contentDocument && iframe.contentDocument.querySelector('video');
            if (v) { v.playbackRate = rate; return; }
          } catch(e2) { /* cross-origin */ }
          // 5. postMessage fallback (Twitch may handle this internally)
          try { iframe.contentWindow.postMessage({ type: 'setPlaybackRate', rate: rate }, '*'); }
          catch(e3) {}
        }
      } catch(e) { console.warn('[TwitchBridge] setPlaybackRate error:', e); }
    };

    window._twitchPlayerGetPlaybackRate = function(id) {
      try {
        var p = players[id];
        if (!p) return 1;
        if (typeof p.getPlaybackRate === 'function') return p.getPlaybackRate();
        var el = document.getElementById(id);
        if (!el) return 1;
        var video = el.querySelector('video');
        if (video) return video.playbackRate;
        return 1;
      } catch(e) { return 1; }
    };
  })();
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
